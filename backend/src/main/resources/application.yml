spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banco_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  retiro:
    limite-diario: ${LIMITE_DIARIO:1000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}