version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: banco-postgres
    restart: always
    environment:
      POSTGRES_DB: banco_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: banco-api
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/banco_db
      DB_USER: postgres
      DB_PASS: postgres
      LIMITE_DIARIO: 1000
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200

volumes:
  postgres_data: